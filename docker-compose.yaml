version: "3.9"

services:
  user-db:
    image: postgres:16
    container_name: user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: Den1234567890/
    ports:
      - "5452:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  profile-db:
    image: postgres:16
    container_name: profile-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: profile_db
      POSTGRES_USER: wave
      POSTGRES_PASSWORD: Den1234567890/
    ports:
      - "5453:5432"
    volumes:
      - profile_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  refresh-hr-token-storage:
    image: redis:7
    container_name: refresh-hr-token-storage
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka

    ports:
      - "9092:9092"
      - "29092:29092"
      - "9093:9093"

    environment:
      # ----------------------------
      # KRaft basic config
      # ----------------------------
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # ----------------------------
      # Listeners (ВАЖНО для хоста)
      # ----------------------------
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093"

      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"

      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # ----------------------------
      # Single-node safe defaults
      # ----------------------------
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # ----------------------------
      # Dev convenience
      # ----------------------------
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    volumes:
      - kafka_data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    container_name: elasticsearch

    environment:
      # single-node режим
      - discovery.type=single-node

      # отключаем security (ВАЖНО для MVP)
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false

      # JVM память (под твой Xeon нормально)
      - ES_JAVA_OPTS=-Xms1g -Xmx1g

      # для Linux (иначе иногда падает)
      - bootstrap.memory_lock=true

    ulimits:
      memlock:
        soft: -1
        hard: -1

    ports:
      - "9200:9200"

    volumes:
      - es_data:/usr/share/elasticsearch/data

    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  user_db_data:
  profile_db_data:
  redis_data:
  kafka_data:
  es_data: